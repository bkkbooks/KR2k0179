body:
  text: 甄烈湘州記太平御覽引三事石形似燕大小如一山明雲淨即翩翩飛翔卷四十九石燕山石石形似燕大小如一山明淨即頡頏飛翔卷一百七十一荊大明中望氣者云湘東有天子氣遣使者巡視斬岡以壓之遂乃湘東王為天子卷一百七十一
